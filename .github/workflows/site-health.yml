name: Проверить здоровье сайта

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  site-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Запустить тесты погоды и бронирования
        run: node tests/site_health_test.js
