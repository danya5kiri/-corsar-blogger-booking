name: Проверить еженедельное уведомление

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/add_weekly_push.py
      - .github/workflows/check-weekly-push.yml

permissions:
  contents: write

jobs:
  verify-and-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Получить проверочную ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Применить изменения
        run: python3 scripts/add_weekly_push.py

      - name: Проверить структуру и поведение
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')

          assert text.count('id="cb-weekly-push"') == 1
          assert text.count('id="cb-weekly-push-body"') == 1
          assert 'WEEKLY_PUSH_TEST_DATE = "2026-07-22"' in text
          assert 'getWeekdayFromDateKey(today) !== 5' in text
          assert 'scheduleWeeklyPush();' in text
          assert 'event.persisted' in text
          assert 'renderRecentCreatorEvents();' in text
          assert '.cb-day-weather {\n    position: static;' in text
          assert 'body.cb-push-open' in text
          assert 'backdrop-filter: blur(14px)' in text
          assert 'Свои бронирования теперь можно перенести или удалить' in text
          assert 'Последние события креаторов обновляются заново при каждом входе' in text

          for element_id in ['calendar', 'booking', 'content', 'cb-calendar', 'cb-details', 'cb-submit', 'cb-report-submit', 'cb-results']:
              assert text.count(f'id="{element_id}"') == 1, element_id

          assert text.count('https://script.google.com/macros/s/') == 1
          assert 'function submitBooking()' in text
          assert 'function submitReport()' in text
          assert 'function renderCalendar()' in text
          assert 'function renderRecentCreatorEvents()' in text
          print('Структура, формы, календарь и уведомление сохранены')
          PY

      - name: Проверить синтаксис JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', text, re.S)
          assert scripts, 'Встроенный JavaScript не найден'
          Path('/tmp/corsar-inline.js').write_text('\n'.join(scripts), encoding='utf-8')
          PY
          node --check /tmp/corsar-inline.js

      - name: Проверить тестовую и пятничную логику
        run: |
          node <<'JS'
          function weekday(key){
            const p = key.split('-');
            return new Date(Date.UTC(Number(p[0]), Number(p[1])-1, Number(p[2]))).getUTCDay();
          }
          if (weekday('2026-07-24') !== 5) throw new Error('24 июля должна быть пятницей');
          if (weekday('2026-07-22') === 5) throw new Error('Тестовая дата не должна зависеть от пятницы');
          console.log('Тестовая дата и пятничный режим корректны');
          JS

      - name: Сохранить проверенный index.html
        run: |
          if git diff --quiet -- index.html; then
            echo "Изменений index.html нет"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Добавить пятничный дайджест и исправить мобильную погоду"
          git push origin HEAD:${{ github.head_ref }}
