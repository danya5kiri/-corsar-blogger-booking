name: Удалить запись @evgivl 26.07

on:
  push:
    branches:
      - remove-evgivl-2026-07-26
    paths:
      - tools/remove_evgivl_2026_07_26.py
      - .github/workflows/remove-evgivl-2026-07-26.yml
  pull_request:
    branches:
      - main
    paths:
      - tools/remove_evgivl_2026_07_26.py
      - .github/workflows/remove-evgivl-2026-07-26.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Получить репозиторий
        uses: actions/checkout@v4
        with:
          ref: remove-evgivl-2026-07-26

      - name: Настроить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Применить точечное удаление
        run: python tools/remove_evgivl_2026_07_26.py

      - name: Проверить изменения
        run: |
          git diff --check
          test -n "$(git status --porcelain index.html)"
          test -z "$(git status --porcelain | grep -v 'index.html' || true)"
          grep -q 'telegram: "@evgivl"' index.html
          grep -q 'date: "2026-07-26"' index.html

      - name: Сохранить изменение
        run: |
          git config user.name "corsar-booking-fix"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "Удалить запись @evgivl 26.07 на барбекю"
          git push origin HEAD:remove-evgivl-2026-07-26
