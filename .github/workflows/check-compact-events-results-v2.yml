name: Повторно проверить компактную ленту и топ-5

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/check-compact-events-results-v2.yml

permissions:
  contents: write

jobs:
  verify-and-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Получить проверочную ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Исправить безопасную подстановку Python
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/compact_events_results.py')
          text = path.read_text(encoding='utf-8')
          old = 'text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)'
          new = 'text, count = re.subn(pattern, lambda match: replacement, text, count=1, flags=re.S)'
          if old not in text:
              raise SystemExit('Строка безопасной подстановки не найдена')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Применить доработки
        run: python3 scripts/compact_events_results.py

      - name: Проверить структуру и логику
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')

          assert text.count('<details id="cb-recent-events-desktop"') == 1
          assert text.count('<details id="cb-recent-events-mobile"') == 1
          assert '<details id="cb-recent-events-desktop" class="cb-recent-events cb-recent-events-desktop">' in text
          assert '<details id="cb-recent-events-mobile" class="cb-recent-events cb-recent-events-mobile">' in text
          assert 'cb-activity-toggle' in text
          assert 'backdrop-filter: blur(12px)' in text
          assert 'var resultsExpanded = false;' in text
          assert 'return b.items.length - a.items.length' in text
          assert 'visibleGroups.slice(0, 5)' in text
          assert "resultsExpanded ? 'Свернуть до 5 мест' : 'Показать все'" in text
          assert 'is-result-top-1' in text and 'is-result-top-2' in text and 'is-result-top-3' in text
          assert 'groupOpen' not in text

          for element_id in ['calendar', 'booking', 'content', 'ranking', 'results', 'cb-calendar', 'cb-details', 'cb-submit', 'cb-report-submit', 'cb-results-filter', 'cb-results']:
              assert text.count(f'id="{element_id}"') == 1, element_id

          order = ['home', 'calendar', 'booking', 'content', 'ranking', 'results']
          positions = [text.index(f'<section id="{item}"') for item in order]
          assert positions == sorted(positions), positions
          print('Сворачивание, топ-5, фильтр и структура сохранены')
          PY

      - name: Проверить синтаксис JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', text, re.S)
          assert scripts, 'Встроенный JavaScript не найден'
          Path('/tmp/corsar-inline.js').write_text('\n'.join(scripts), encoding='utf-8')
          PY
          node --check /tmp/corsar-inline.js

      - name: Проверить сохранность API и форм
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          assert 'https://script.google.com/macros/s/AKfycbyRUzCwCTkj4TzURMsYfCZGVRrZnxoeoqTzz76w3n9qz-JlU4ji2i3e1xYQr4CymGsf8Q/exec' in text
          assert 'function submitBooking()' in text
          assert 'function submitReport()' in text
          assert 'function renderCalendar()' in text
          assert 'function fetchRemoteRows(timeoutMs)' in text
          assert 'method: "POST"' in text
          print('API, календарь и формы не изменены')
          PY

      - name: Сохранить проверенный index.html
        run: |
          if git diff --quiet -- index.html; then
            echo "Изменений index.html нет"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Свернуть события и показать топ-5 результатов"
          git push origin HEAD:${{ github.head_ref }}
