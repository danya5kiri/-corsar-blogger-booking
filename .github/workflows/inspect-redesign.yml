name: Inspect redesign anchors

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  inspect:
    if: github.head_ref == 'creacloud-visual-redesign'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Save loader and structure anchors
        run: |
          {
            echo '--- loader functions ---'
            grep -nE 'setLoader|finishLoader|hideSplash|loaderReady|cb-loader|splash' index.html | tail -120
            echo '--- script end / init ---'
            grep -nE 'DOMContentLoaded|setupDiagnostics|loadData|loadWeather|Promise\.all|window\.addEventListener\("load"' index.html | tail -150
            echo '--- key visual classes ---'
            grep -nE '^\.cb-section|^\.cb-form-card|^\.cb-calendar-shell|^\.cb-ranking-section|^\.cb-results-section|^\.cb-footer' index.html | head -160
          } > redesign-inspection.txt
          cat redesign-inspection.txt
      - name: Commit inspection
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add redesign-inspection.txt
          git commit -m "Зафиксировать точки интеграции редизайна" || true
          git push origin HEAD:${{ github.head_ref }}
