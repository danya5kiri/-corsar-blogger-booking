name: Inspect redesign anchors

on:
  pull_request:
    branches: [main]

jobs:
  inspect:
    if: github.head_ref == 'creacloud-visual-redesign'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Inspect loader and structure anchors
        run: |
          echo '--- loader functions ---'
          grep -nE 'setLoader|finishLoader|hideSplash|loaderReady|cb-loader|splash' index.html | tail -100
          echo '--- script end / init ---'
          grep -nE 'DOMContentLoaded|setupDiagnostics|loadData|loadWeather|Promise\.all|window\.addEventListener\("load"' index.html | tail -120
          echo '--- key visual classes ---'
          grep -nE '^\.cb-section|^\.cb-form-card|^\.cb-calendar-shell|^\.cb-ranking-section|^\.cb-results-section|^\.cb-footer' index.html | head -120
