name: Проверить мобильное выравнивание кнопок

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/update_mobile_button_alignment.py
      - .github/workflows/check-mobile-button-style.yml

permissions:
  contents: write

jobs:
  verify-and-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Получить проверочную ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Обновить стили кнопок
        run: python3 scripts/update_mobile_button_alignment.py

      - name: Проверить визуальные правила и ссылки
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          booking = re.search(r'\.cb-link-button-booking\s*\{(.*?)\}', text, re.S)
          assert booking, 'Не найден стиль кнопки записи'
          assert 'linear-gradient' in booking.group(1)
          assert 'var(--cb-coral)' in booking.group(1)
          assert 'var(--cb-yellow)' in booking.group(1)
          assert 'color: #fff' in booking.group(1)

          mobile = re.search(r'@media \(max-width: 600px\)\s*\{(.*?)\n\}', text, re.S)
          assert mobile, 'Не найден мобильный media-блок'
          mobile_text = mobile.group(1)
          assert re.search(r'\.cb-link-button\s*\{\s*width:\s*100%;', mobile_text, re.S)
          assert re.search(r'\.cb-link-button-sequenced\s*\{[^}]*justify-content:\s*flex-start;[^}]*text-align:\s*left;', mobile_text, re.S)

          assert 'href="https://t.me/+nYzsW9t8e38xZGJi"' in text
          assert 'href="#calendar"' in text
          assert 'href="#content"' in text
          assert text.count('cb-link-button-step') >= 4
          print('Градиент, мобильное выравнивание и ссылки корректны')
          PY

      - name: Проверить синтаксис JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', text, re.S)
          Path('/tmp/corsar-inline.js').write_text('\n'.join(scripts), encoding='utf-8')
          PY
          node --check /tmp/corsar-inline.js

      - name: Сохранить проверенный index.html
        run: |
          if git diff --quiet -- index.html; then
            echo "Изменений index.html нет"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Выровнять мобильные кнопки и добавить оранжевый градиент"
          git push origin HEAD:${{ github.head_ref }}
