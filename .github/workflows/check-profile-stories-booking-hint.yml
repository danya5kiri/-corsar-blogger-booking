name: Проверить профиль, истории и подсказку бронирования

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/patch_profile_stories_booking_hint.py
      - .github/workflows/check-profile-stories-booking-hint.yml

permissions:
  contents: write

jobs:
  patch-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Получить ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Применить проверочный патч
        run: python3 scripts/patch_profile_stories_booking_hint.py

      - name: Проверить структуру и ограничения
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          assert text.count('id="cb-profile-entry-input"') == 1
          assert text.count('id="creator-profile"') == 1
          assert text.index('id="creator-profile"') > text.index('id="results"')
          assert text.index('id="creator-profile"') < text.index('id="creacloud"')
          assert 'creatorStoryItems = getPublishedContentItems().slice(0, 5);' in text
          assert '<strong>" + count + " " + freshness + "</strong>' in text
          assert 'findBookingUniqueAlternative' in text
          assert 'mode.value !== "new"' in text
          assert 'hasBookingSlotConflict(date, tour)' in text
          assert 'setupCreatorProfilePlacement();' in text
          assert 'cb-profile-metrics is-compact' in text
          assert 'Управлять бронированием' in text
          assert 'Добавить контент' in text
          profile = re.search(r'function renderCreatorProfile\(\)\{.*?\n\}', text, re.S).group(0)
          assert 'cb-profile-view-works' not in profile
          assert 'cb-profile-change' not in profile
          assert 'cb-profile-ranks' not in profile
          assert 'cb-profile-tour-columns' not in profile
          assert 'window.visualViewport' not in text
          assert 'document.body.style.position' not in text
          assert 'body.cb-push-open' not in text
          assert 'AKfycbyRUzCwCTkj4TzURMsYfCZGVRrZnxoeoqTzz76w3n9qz-JlU4ji2i3e1xYQr4CymGsf8Q' in text
          print('Структурные проверки пройдены')
          PY

      - name: Проверить JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', text, flags=re.S | re.I)
          inline = '\n'.join(s for s in scripts if s.strip())
          Path('/tmp/corsar-inline.js').write_text(inline, encoding='utf-8')
          PY
          node --check /tmp/corsar-inline.js

      - name: Сохранить проверенный index.html
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html уже соответствует патчу"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Уточнить мини-ЛК, истории и подсказки бронирования"
          git push origin HEAD:${{ github.head_ref }}
