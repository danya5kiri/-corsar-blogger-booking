name: Проверить прогнозы и ленту событий

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/add_weather_activity.py
      - .github/workflows/check-weather-activity.yml

permissions:
  contents: write

jobs:
  verify-and-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Получить проверочную ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Применить доработки
        run: python3 scripts/add_weather_activity.py

      - name: Проверить структуру и ключевую логику
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')

          assert text.count('id="cb-recent-events-desktop"') == 1
          assert text.count('id="cb-recent-events-mobile"') == 1
          assert 'Владивосток завтра' in text
          assert 'forecast_days=16' in text
          assert 'daily=weather_code,temperature_2m_max' in text
          assert 'active && isWeatherDateInActiveMonth(date)' in text
          assert 'formatWeatherBrief(forecast)' in text
          assert 'renderRecentCreatorEvents();' in text
          assert 'getPublishedContentItems()' in text
          assert 'занял первое место по количеству туров' in text
          assert 'занял первое место по опубликованному контенту' in text

          for element_id in ['calendar', 'booking', 'content', 'cb-calendar', 'cb-details', 'cb-submit', 'cb-report-submit', 'cb-analytics', 'cb-results']:
              assert text.count(f'id="{element_id}"') == 1, element_id

          order = ['home', 'calendar', 'booking', 'content', 'ranking', 'results']
          positions = [text.index(f'<section id="{item}"') for item in order]
          assert positions == sorted(positions), positions

          assert 'https://script.google.com/macros/s/' in text
          assert 'function submitBooking()' in text
          assert 'function submitReport()' in text
          assert 'function renderCalendar()' in text
          assert 'function renderDetails(date, animate)' in text
          print('Структура, секции, формы и новые функции сохранены')
          PY

      - name: Проверить синтаксис JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', text, re.S)
          assert scripts, 'Встроенный JavaScript не найден'
          Path('/tmp/corsar-inline.js').write_text('\n'.join(scripts), encoding='utf-8')
          PY
          node --check /tmp/corsar-inline.js

      - name: Проверить погодный API
        run: |
          python3 - <<'PY'
          import json
          import urllib.request

          url = ('https://api.open-meteo.com/v1/forecast?latitude=43.1155&longitude=131.8855'
                 '&daily=weather_code,temperature_2m_max,temperature_2m_min,apparent_temperature_max,'
                 'precipitation_probability_max,wind_speed_10m_max&timezone=Asia%2FVladivostok&forecast_days=16')
          with urllib.request.urlopen(url, timeout=25) as response:
              data = json.load(response)
          daily = data.get('daily') or {}
          dates = daily.get('time') or []
          assert len(dates) >= 2, dates
          for key in ['weather_code', 'temperature_2m_max', 'temperature_2m_min', 'apparent_temperature_max', 'precipitation_probability_max', 'wind_speed_10m_max']:
              assert len(daily.get(key) or []) == len(dates), key
          print('Погодный API вернул', len(dates), 'дней')
          PY

      - name: Проверить формат базы событий
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json
          import re
          import time
          import urllib.request

          callback = 'corsarAuditCallback'
          url = ('https://script.google.com/macros/s/AKfycbyRUzCwCTkj4TzURMsYfCZGVRrZnxoeoqTzz76w3n9qz-JlU4ji2i3e1xYQr4CymGsf8Q/exec'
                 f'?callback={callback}&t={int(time.time())}')
          with urllib.request.urlopen(url, timeout=30) as response:
              raw = response.read().decode('utf-8-sig')
          match = re.search(r'^\s*' + callback + r'\((.*)\)\s*;?\s*$', raw, re.S)
          assert match, raw[:200]
          rows = json.loads(match.group(1))
          assert isinstance(rows, list)
          print('Строк базы:', len(rows))
          for row in rows[-5:]:
              if isinstance(row, dict):
                  print('Поля последней строки:', sorted(row.keys()))
          PY

      - name: Сохранить проверенный index.html
        run: |
          if git diff --quiet -- index.html; then
            echo "Изменений index.html нет"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Добавить прогнозы и последние события креаторов"
          git push origin HEAD:${{ github.head_ref }}
