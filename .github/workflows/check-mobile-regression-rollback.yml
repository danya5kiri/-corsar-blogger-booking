name: Проверить откат мобильного сбоя

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/remove_mobile_regression.py
      - .github/workflows/check-mobile-regression-rollback.yml

permissions:
  contents: write

jobs:
  verify-and-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Получить проверочную ветку
        uses: actions/checkout@v4
        with:
          ref: rollback-mobile-overlay-regression
          fetch-depth: 0

      - name: Убрать мобильную надстройку
        run: python3 scripts/remove_mobile_regression.py

      - name: Проверить структуру и ограничения
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          text = Path('index.html').read_text(encoding='utf-8')
          base = subprocess.check_output(['git', 'show', 'origin/main:index.html'], text=True)

          assert 'visualViewport' not in text
          assert 'scheduleWeeklyPush' not in text
          assert 'setupWeeklyPush' not in text
          assert 'id="cb-weekly-push"' not in text
          assert '--cb-visual-center-y' not in text
          assert '--cb-visual-bottom-gap' not in text
          assert 'position: relative;\n  z-index: 1;\n  display: flex;\n  width: min(680px, calc(100vw - 48px));' in text
          assert 'bottom: calc(14px + env(safe-area-inset-bottom));' in text
          assert 'body.cb-lock-scroll #corsar-blogger-booking' in text
          assert 'inset: -8px;' in text

          api = re.search(r'API_URL:\s*"([^"]+)"', text).group(1)
          base_api = re.search(r'API_URL:\s*"([^"]+)"', base).group(1)
          assert api == base_api

          for marker in [
              'id="calendar"', 'id="booking"', 'id="content"',
              'id="ranking"', 'id="results"', 'id="cb-submit"',
              'id="cb-report-submit"', 'function renderRecentCreatorEvents()',
              'function renderCalendar()', 'function submitBooking()',
              'function submitReport()'
          ]:
              assert marker in text, marker

          print('structure checks passed')
          PY

      - name: Проверить синтаксис JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', text, re.S)
          assert scripts, 'inline script not found'
          Path('/tmp/corsar-app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/corsar-app.js

      - name: Сохранить проверенный index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Убрать мобильный сбой после уведомления"
          git push origin HEAD:rollback-mobile-overlay-regression
