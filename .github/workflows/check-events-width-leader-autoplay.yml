name: Проверить ширину событий и автолистание лидеров

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/adjust_events_width_leader_autoplay.py
      - .github/workflows/check-events-width-leader-autoplay.yml

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Применить точечный патч
        run: python3 scripts/adjust_events_width_leader_autoplay.py

      - name: Проверить структуру изменений
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          required = [
              'width: var(--cb-events-desktop-width, 100%);',
              'function setupDesktopRecentEventsWidth()',
              'Math.ceil(right - left)',
              'var LEADER_AUTO_INTERVAL = 5000;',
              'function scheduleLeaderAutoPlay()',
              'setLeaderCardPosition(leaderCardPosition + 1, true);',
              'root.addEventListener("pointerenter", stopLeaderAutoPlay);',
              'document.addEventListener("visibilitychange"',
              'setupDesktopRecentEventsWidth();'
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit('Не найдены обязательные элементы: ' + ', '.join(missing))
          if 'max-width: 680px;' in text[text.find('.cb-recent-events-desktop'):text.find('.cb-recent-events-mobile')]:
              raise SystemExit('Старое ограничение ширины блока событий осталось')
          print('Структура проверена')
          PY

      - name: Проверить JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          start = text.rfind('<script>')
          end = text.rfind('</script>')
          if start < 0 or end < 0 or end <= start:
              raise SystemExit('Не найден основной script')
          Path('/tmp/site.js').write_text(text[start + len('<script>'):end], encoding='utf-8')
          PY
          node --check /tmp/site.js

      - name: Убедиться, что API и основные разделы сохранены
        run: |
          grep -q 'AKfycbyRUzCwCTkj4TzURMsYfCZGVRrZnxoeoqTzz76w3n9qz-JlU4ji2i3e1xYQr4CymGsf8Q' index.html
          grep -q 'id="calendar"' index.html
          grep -q 'id="booking"' index.html
          grep -q 'id="content"' index.html
          grep -q 'id="ranking"' index.html
          grep -q 'id="results"' index.html

      - name: Зафиксировать результат в ветке
        run: |
          if git diff --quiet -- index.html; then
            echo "Изменений для коммита нет"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Выровнять последние события и включить автолистание лидеров"
          git push origin HEAD:${{ github.head_ref }}
