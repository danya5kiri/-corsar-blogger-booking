name: Проверить третью карточку лидера

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/add_unique_tour_leader_card.py
      - .github/workflows/check-third-unique-leader.yml

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Применить изменение
        run: python3 scripts/add_unique_tour_leader_card.py

      - name: Проверить структуру и логику
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')

          required = [
              'id="cb-unique-leader-card"',
              'id="cb-unique-leader-name"',
              'id="cb-unique-leader-count"',
              'id="cb-unique-leader-action"',
              'Смотреть расписание',
              '.cb-leaders-track .cb-content-leader-card',
              '.cb-leaders-track .cb-unique-leader-card',
              'var LEADER_CARD_LABELS = ["По количеству туров", "По опубликованному контенту", "По уникальным турам"];',
              'function renderUniqueTourLeader(ranking)',
              'return b.uniqueTours - a.uniqueTours || b.visits - a.visits || a.name.localeCompare(b.name, "ru");',
              'renderUniqueTourLeader(ranking);',
              'function focusTourSchedule()',
              'calendar.scrollIntoView({behavior: "smooth", block: "start"});',
          ]
          for marker in required:
              if marker not in text:
                  raise SystemExit(f'Не найден обязательный маркер: {marker}')

          if text.count('class="cb-stat-card cb-leader-card') != 3:
              raise SystemExit('В карусели должно быть ровно три карточки лидеров')

          if 'linear-gradient(135deg, #ffd66b 0%, #ffb09e 38%, #cbbdff 70%, #8ce8f4 100%)' not in text:
              raise SystemExit('Изменён исходный градиент лидера по количеству туров')

          if 'return b.visits - a.visits || a.name.localeCompare(b.name, "ru");' not in text:
              raise SystemExit('Изменена действующая сортировка основного рейтинга')

          if 'return b.materials - a.materials || a.name.localeCompare(b.name, "ru");' not in text:
              raise SystemExit('Изменена действующая сортировка лидера по контенту')

          if 'API_URL: "https://script.google.com/macros/s/' not in text:
              raise SystemExit('API_URL повреждён')

          if 'window.visualViewport' in text or 'document.body.style.position = "fixed"' in text:
              raise SystemExit('Возвращена нестабильная мобильная фиксация')

          scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
          if len(scripts) != 1:
              raise SystemExit(f'Ожидался один встроенный script, найдено {len(scripts)}')
          Path('/tmp/site.js').write_text(scripts[0], encoding='utf-8')
          print('Третья карточка лидера настроена корректно')
          PY

      - name: Проверить JavaScript
        run: node --check /tmp/site.js

      - name: Сохранить проверенный index.html
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html не изменился"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Добавить лидера по уникальным турам"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
