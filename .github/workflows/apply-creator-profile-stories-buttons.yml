name: Применить правки ЛК, материалов и кнопок

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-check:
    if: github.head_ref == 'creator-profile-stories-buttons-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Применить патч
        run: |
          python tools/apply_creator_profile_stories_buttons.py
          python tools/fix_creator_achievement_priority.py
      - name: Проверить JavaScript и продуктовые сценарии
        run: |
          set +e
          node tests/site_health_test.js > /tmp/feature-test-output.txt 2>&1
          status=$?
          cat /tmp/feature-test-output.txt
          if [ $status -ne 0 ]; then
            cp /tmp/feature-test-output.txt feature-test-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add feature-test-error.txt
            git commit -m "Зафиксировать ошибку теста ЛК" || true
            git push origin HEAD:${{ github.head_ref }} || true
            exit $status
          fi
      - name: Проверить ключевые изменения
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          required = [
              'id="cb-profile-entry-title">Открыть ЛК',
              'id="cb-profile-close"',
              'function closeCreatorProfile()',
              'function getCreatorProfileAchievements(data)',
              'cb-stories-today-index',
              'id="cb-story-add-card"',
              'button:not(:disabled):not([aria-disabled="true"])',
          ]
          for item in required:
              assert item in text, item
          assert text.index('<footer id="creacloud"') < text.index('id="cb-diagnostics"')
          assert '<div class="cb-profile-metrics is-compact">' not in text
          print('feature checks passed')
          PY
      - name: Зафиксировать рабочие файлы
        run: |
          rm -f feature-test-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html tests/site_health_test.js feature-test-error.txt
          git commit -m "Обновить ЛК, материалы и активные кнопки"
          git push origin HEAD:${{ github.head_ref }}
