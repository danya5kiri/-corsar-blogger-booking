name: Apply CREACLOUD redesign

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  redesign:
    if: github.head_ref == 'creacloud-visual-redesign'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply integration
        run: python tools/apply_creacloud_redesign.py
      - name: Test product and both design modes
        run: |
          node --check creacloud-design.js
          node tests/site_health_test.js
          node tests/design_modes_test.js
          python - <<'PY'
          from pathlib import Path
          h = Path('index.html').read_text(encoding='utf-8')
          c = Path('creacloud-redesign.css').read_text(encoding='utf-8')
          assert c.count('{') == c.count('}')
          for x in ['id="home"','id="calendar"','id="booking"','id="content"','id="ranking"','id="results"','function submitBooking()','function submitReport()','TOTAL_UNIQUE_TOURS','models=best_match']:
              assert x in h, x
          assert h.index('id="home"') < h.index('id="calendar"') < h.index('id="booking"') < h.index('id="content"') < h.index('id="ranking"') < h.index('id="results"')
          PY
      - name: Commit integration
        run: |
          rm -f redesign-inspection.txt redesign-test-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html redesign-inspection.txt redesign-test-error.txt
          git commit -m "Интегрировать визуальный редизайн CREACLOUD"
          git push origin HEAD:${{ github.head_ref }}
