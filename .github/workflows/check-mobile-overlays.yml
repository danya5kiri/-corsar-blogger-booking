name: Проверить мобильные оверлеи и погоду

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/fix_mobile_overlays.py
      - .github/workflows/check-mobile-overlays.yml

permissions:
  contents: write

jobs:
  verify-and-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Получить проверочную ветку
        uses: actions/checkout@v4
        with:
          ref: fix-mobile-overlays-weather-title
          fetch-depth: 0

      - name: Уточнить замену названия блока
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/fix_mobile_overlays.py')
          text = path.read_text(encoding='utf-8')
          old = '''old_title = "Последние события креаторов"
          if text.count(old_title) != 3:
              raise RuntimeError(f"название блока: ожидалось 3 совпадения, найдено {text.count(old_title)}")
          text = text.replace(old_title, "Последние события")'''
          new = '''static_old = '<span class="cb-activity-title">Последние события креаторов</span>'
          static_new = '<span class="cb-activity-title">Последние события</span>'
          if text.count(static_old) != 3:
              raise RuntimeError(f"название блока: ожидалось 3 заголовка, найдено {text.count(static_old)}")
          text = text.replace(static_old, static_new)'''
          if text.count(old) != 1:
              raise RuntimeError('не найден технический блок замены названия')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Применить исправления
        run: python3 scripts/fix_mobile_overlays.py

      - name: Проверить структуру и ограничения
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          base = __import__('subprocess').check_output(['git', 'show', 'origin/main:index.html'], text=True)

          assert text.count('<span class="cb-activity-title">Последние события</span>') == 3
          assert text.count('Последние события креаторов') == 1
          assert 'height: 100lvh;' in text
          assert 'height: 100dvh;' in text
          assert 'function lockViewportScroll(reason)' in text
          assert 'function unlockViewportScroll(reason)' in text
          assert 'lockViewportScroll("splash")' in text
          assert 'unlockViewportScroll("splash")' in text
          assert 'lockViewportScroll("weekly-push")' in text
          assert 'unlockViewportScroll("weekly-push")' in text
          assert 'order: 1;' in text and 'order: 2;' in text and 'order: 3;' in text
          assert 'max-height: calc(100dvh' in text

          api = re.search(r'API_URL:\s*"([^"]+)"', text).group(1)
          base_api = re.search(r'API_URL:\s*"([^"]+)"', base).group(1)
          assert api == base_api

          for marker in ['id="calendar"', 'id="booking"', 'id="content"', 'id="ranking"', 'id="results"', 'id="cb-submit"', 'id="cb-report-submit"']:
              assert marker in text

          # Третий блок метрик Instagram намеренно не внедряется в этой задаче.
          assert text.count('class="cb-stat-card cb-leader-card') == 2
          print('structure checks passed')
          PY

      - name: Проверить синтаксис JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', text, re.S)
          assert scripts, 'inline script not found'
          Path('/tmp/corsar-app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/corsar-app.js

      - name: Сохранить проверенный index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Исправить мобильные оверлеи и положение погоды"
          git push origin HEAD:fix-mobile-overlays-weather-title
