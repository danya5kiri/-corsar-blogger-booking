name: Проверить сценарий календаря

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/update_calendar_booking_flow.py
      - .github/workflows/update-calendar-booking-flow.yml

permissions:
  contents: write

jobs:
  update-and-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Получить проверочную ветку
        uses: actions/checkout@v4
        with:
          ref: calendar-window-booking-flow

      - name: Настроить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Обновить сценарий календаря
        run: python tools/update_calendar_booking_flow.py

      - name: Проверить встроенный JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
          if not scripts:
              raise SystemExit('Встроенный JavaScript не найден')
          Path('/tmp/corsar-inline.js').write_text('\n'.join(scripts), encoding='utf-8')
          PY
          node --check /tmp/corsar-inline.js

      - name: Проверить границы изменения
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          required = [
              'renderDetails(date, true);',
              'detailsSection.scrollIntoView({behavior: "smooth", block: "start"})',
              '.cb-window-action:not(:disabled)',
              'bookingSection.scrollIntoView({behavior: "smooth", block: "start"})',
              'if(hasBookingSlotConflict(date, chosenTour))',
              '(occupied ? \' disabled\' : \'\')',
          ]
          for marker in required:
              if marker not in text:
                  raise SystemExit('Не найдена проверка: ' + marker)
          if 'API_URL: "https://script.google.com/macros/s/' not in text:
              raise SystemExit('Изменён API')
          if 'var TOURS_BY_DATE = {' not in text:
              raise SystemExit('Повреждено расписание')
          print('Проверки пройдены')
          PY

      - name: Сохранить проверенное изменение
        run: |
          git config user.name "corsar-calendar-check"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Изменить переход из календаря к бронированию"
          git push origin HEAD:calendar-window-booking-flow
