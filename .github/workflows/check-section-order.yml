name: Проверить порядок разделов сайта

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/reorder_site_sections.py
      - .github/workflows/check-section-order.yml

permissions:
  contents: write

jobs:
  verify-and-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Получить проверочную ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Переставить разделы
        run: python3 scripts/reorder_site_sections.py

      - name: Проверить структуру и неизменность логики
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          order = ['home', 'calendar', 'booking', 'content', 'ranking', 'results']
          positions = [text.index(f'<section id="{item}"') for item in order]
          assert positions == sorted(positions), positions

          expected_kickers = {
              'calendar': '02 / Расписание',
              'booking': '03 / Бронирование',
              'content': '04 / Готовый материал',
              'ranking': '05 / Статистика',
              'results': '06 / Итоги туров',
          }
          for section_id, label in expected_kickers.items():
              start = text.index(f'<section id="{section_id}"')
              end = text.index('</section>', start)
              assert label in text[start:end], (section_id, label)

          nav = re.search(r'<div class="cb-nav-links">(.*?)</div>', text, re.S).group(1)
          nav_order = re.findall(r'data-section="([^"]+)"', nav)
          assert nav_order == order, nav_order

          for element_id in ['cb-calendar', 'cb-details', 'cb-submit', 'cb-report-submit', 'cb-analytics', 'cb-results']:
              assert text.count(f'id="{element_id}"') == 1, element_id

          assert 'https://script.google.com/macros/s/' in text
          assert 'function submitBooking()' in text
          assert 'function submitReport()' in text
          assert 'function renderCalendar()' in text
          print('Структура, идентификаторы и ключевая логика сохранены')
          PY

      - name: Проверить синтаксис JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', text, re.S)
          Path('/tmp/corsar-inline.js').write_text('\n'.join(scripts), encoding='utf-8')
          PY
          node --check /tmp/corsar-inline.js

      - name: Сохранить проверенный index.html
        run: |
          if git diff --quiet -- index.html; then
            echo "Изменений index.html нет"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Переставить разделы сайта и обновить нумерацию"
          git push origin HEAD:${{ github.head_ref }}
