name: Проверить мини-ЛК креатора

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/patch_creator_profile.py
      - .github/workflows/check-creator-profile.yml

permissions:
  contents: write

jobs:
  patch-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Получить ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Применить патч
        run: python scripts/patch_creator_profile.py

      - name: Проверить структуру и JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          assert 'id="cb-profile-entry-input"' in text
          assert 'id="creator-profile"' in text
          assert 'id="cb-profile-dashboard"' in text
          assert 'function renderCreatorProfile()' in text
          assert 'function findCreatorProfileRecommendation' in text
          assert 'function prefillCreatorProfileRecommendation' in text
          assert 'fillCreatorDatalist("cb-profile-creators", bookingDirectory)' in text
          assert 'renderCreatorProfile();\n  renderCreatorStories();' in text
          assert 'background: #fff;' in text[text.index('.cb-stories-shell {'):text.index('.cb-stories-shell::before')]
          assert 'cb-story-card.is-tone-2' in text
          assert 'getUniqueTourKey(tour)' in text
          assert 'hasBookingSlotConflict(date, tour)' in text
          assert 'visualViewport' not in text
          assert 'document.body.style.position' not in text
          assert 'cb-next-tour-shell' not in text
          script = text.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/corsar-site.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/corsar-site.js

      - name: Зафиксировать результат проверки
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html уже содержит мини-ЛК"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Добавить мини-ЛК креатора"
          git push origin HEAD:${{ github.head_ref }}
