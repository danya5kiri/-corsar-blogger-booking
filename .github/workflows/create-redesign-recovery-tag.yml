name: Создать точку восстановления редизайна

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  recovery-tag:
    if: github.head_ref == 'creacloud-visual-redesign'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Создать тег pre-creacloud-redesign
        run: |
          if git ls-remote --exit-code --tags origin refs/tags/pre-creacloud-redesign >/dev/null 2>&1; then
            echo "Тег уже существует"
            exit 0
          fi
          git tag pre-creacloud-redesign 2f48786259d0d70984770fe9a498655859bfaa83
          git push origin refs/tags/pre-creacloud-redesign
