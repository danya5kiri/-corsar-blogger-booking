name: Проверить короткий заголовок уникальных туров

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/patch_unique_leader_title.py
      - .github/workflows/check-unique-leader-title.yml

permissions:
  contents: write

jobs:
  patch-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Получить ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Применить точечный патч
        run: python scripts/patch_unique_leader_title.py

      - name: Проверить структуру и JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          assert '<div class="cb-stat-label">Лидер по уникальным турам</div>' in text
          assert '<div class="cb-stat-label">Лидер по количеству уникальных туров</div>' not in text
          assert 'aria-label="Лидер по количеству уникальных туров"' in text
          assert 'Смотреть расписание' in text
          script = text.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/corsar-site.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/corsar-site.js

      - name: Зафиксировать результат проверки
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html уже содержит нужный заголовок"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Сократить заголовок лидера по уникальным турам"
          git push origin HEAD:${{ github.head_ref }}
