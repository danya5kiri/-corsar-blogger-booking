name: Проверить непривязанные публикации

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/audit_unmatched_content.py
      - tools/reconcile_unmatched_content.py
      - .github/workflows/audit-unmatched-content.yml

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Получить проверочную ветку
        uses: actions/checkout@v4
        with:
          ref: reconcile-unmatched-content

      - name: Настроить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Проверить старые публикации
        run: python tools/audit_unmatched_content.py

      - name: Подключить исторические публикации
        run: python tools/reconcile_unmatched_content.py

      - name: Проверить изменения
        run: |
          git diff --check
          grep -q 'function resolveHistoricalContentReport(report)' index.html
          grep -q '.map(resolveHistoricalContentReport)' index.html
          grep -q 'function hasContentDuplicate(link)' index.html
          grep -q 'dedupeKey: "content:" + linkKey' index.html

      - name: Сохранить проверенный результат
        run: |
          git config user.name "corsar-content-audit"
          git config user.email "actions@users.noreply.github.com"
          git add index.html unmatched-content-audit.json
          git diff --cached --quiet && exit 0
          git commit -m "Подтянуть старые публикации к записям креаторов"
          git push origin HEAD:reconcile-unmatched-content
