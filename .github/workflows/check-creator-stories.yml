name: Проверить истории креаторов

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/patch_creator_stories.py
      - .github/workflows/check-creator-stories.yml

permissions:
  contents: write

jobs:
  patch-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Получить ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Применить точечный патч
        run: python scripts/patch_creator_stories.py

      - name: Проверить структуру и JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          assert 'id="cb-creator-stories" class="cb-stories-shell"' in text
          assert '<details id="cb-creator-stories"' in text
          assert text.index('<details id="cb-creator-stories"') < text.index('<section id="calendar"')
          assert 'id="cb-story-viewer"' in text
          assert 'getPublishedContentItems().slice(0, 10)' in text
          assert 'CREATOR_STORY_STORAGE_KEY' in text
          assert 'setupCreatorStories();' in text
          assert text.count('renderCreatorStories();') >= 2
          assert 'Смотреть публикацию ↗' in text
          assert 'window.visualViewport' not in text
          assert 'document.body.style.position' not in text
          assert 'body.cb-story' not in text
          assert 'AKfycbyRUzCwCTkj4TzURMsYfCZGVRrZnxoeoqTzz76w3n9qz-JlU4ji2i3e1xYQr4CymGsf8Q' in text
          script = text.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/corsar-site.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/corsar-site.js

      - name: Зафиксировать результат проверки
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html уже содержит блок историй"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Добавить сворачиваемые истории креаторов"
          git push origin HEAD:${{ github.head_ref }}
