name: Проверить описание мини-ЛК

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/patch_profile_entry_copy.py
      - .github/workflows/check-profile-entry-copy.yml

permissions:
  contents: write

jobs:
  patch-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Получить ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Уточнить описание
        run: python3 scripts/patch_profile_entry_copy.py

      - name: Проверить итог
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          assert 'Уникальные туры, ближайшая бронь, публикации и персональная рекомендация.' in text
          assert 'места в рейтингах и персональная рекомендация' not in text
          assert 'creatorStoryItems = getPublishedContentItems().slice(0, 5);' in text
          assert 'findBookingUniqueAlternative' in text
          assert text.index('id="creator-profile"') < text.index('id="creacloud"')
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', text, flags=re.S | re.I)
          Path('/tmp/corsar-inline.js').write_text('\n'.join(s for s in scripts if s.strip()), encoding='utf-8')
          PY
          node --check /tmp/corsar-inline.js

      - name: Сохранить правку
        run: |
          if git diff --quiet -- index.html; then
            echo "Описание уже актуально"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Уточнить описание входа в мини-ЛК"
          git push origin HEAD:${{ github.head_ref }}
