name: Проверить сезонный дашборд

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/fix_season_metric_selector.py
      - .github/workflows/check-season-dashboard.yml

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Уточнить селектор метрик
        run: python3 scripts/fix_season_metric_selector.py

      - name: Проверить структуру и логику
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          required = [
              'id="cb-season-days-value"',
              'id="cb-season-sunset"',
              'class="cb-season-sunset-sun"',
              'function setSeasonSunProgress(progress, ended)',
              'pluralCount(daysLeft, "день", "дня", "дней")',
              'daysEl.textContent = "Сезон окончен";',
              'function isActivityCreatedToday(item)',
              'getActivityTimestamp(item)',
              'getVladivostokDateKey(new Date(timestamp)) === getTodayKey()',
              'function renderSeasonMetricValue(element, total, todayDelta, deltaLabel)',
              'class="cb-season-delta"',
              'firstBookingByCreator',
              'bookingsToday = activeBookings.filter(isActivityCreatedToday).length',
              '.cb-season-metric > span {',
          ]
          for marker in required:
              if marker not in text:
                  raise SystemExit(f'Не найден обязательный маркер: {marker}')

          forbidden = [
              '"</strong> дн."',
              'daysEl.textContent = "Сезон завершён";',
              '.cb-season-metric span {',
              'window.visualViewport',
              'document.body.style.position = "fixed"',
          ]
          for marker in forbidden:
              if marker in text:
                  raise SystemExit(f'Найден запрещённый маркер: {marker}')

          if 'creatorsEl.textContent = Object.keys(creators).length;' in text:
              raise SystemExit('Старый вывод метрики креаторов не заменён')
          if 'bookingsEl.textContent = activeBookings.length;' in text:
              raise SystemExit('Старый вывод метрики записей не заменён')
          if 'API_URL: "https://script.google.com/macros/s/' not in text:
              raise SystemExit('API_URL повреждён')

          scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
          if len(scripts) != 1:
              raise SystemExit(f'Ожидался один встроенный script, найдено {len(scripts)}')
          Path('/tmp/site.js').write_text(scripts[0], encoding='utf-8')
          print('Сезонный дашборд настроен корректно')
          PY

      - name: Проверить JavaScript
        run: node --check /tmp/site.js

      - name: Сохранить проверенный index.html
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html не изменился"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Исправить отображение дневных показателей"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
