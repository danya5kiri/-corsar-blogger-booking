name: Проверить сезонный дашборд

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/update_season_dashboard.py
      - .github/workflows/check-season-dashboard.yml

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Применить изменение
        run: python3 scripts/update_season_dashboard.py

      - name: Проверить структуру и логику
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          required = [
              'function seasonSunsetIcon(progress, ended)',
              'Сезон окончен',
              'pluralCount(daysLeft, "день", "дня", "дней")',
              'class="cb-season-sunset"',
              'function getTodaySeasonMetrics(activeBookings)',
              'function renderSeasonMetricValue(element, total, today, label)',
              'cb-season-delta',
              'getActivityTimestamp(firstBookingByCreator[creator])',
              'renderSeasonMetricValue(creatorsEl, Object.keys(creators).length, todayMetrics.creators',
              'renderSeasonMetricValue(bookingsEl, activeBookings.length, todayMetrics.bookings',
          ]
          for marker in required:
              if marker not in text:
                  raise SystemExit(f'Не найден обязательный маркер: {marker}')

          forbidden = [
              '</strong> дн.',
              'Сезон завершён',
              'window.visualViewport',
              'document.body.style.position = "fixed"',
          ]
          for marker in forbidden:
              if marker in text:
                  raise SystemExit(f'Найден запрещённый маркер: {marker}')

          if 'activeBookings.length' not in text or 'Object.keys(creators).length' not in text:
              raise SystemExit('Изменён базовый подсчёт сезонных метрик')
          if 'API_URL: "https://script.google.com/macros/s/' not in text:
              raise SystemExit('API_URL повреждён')

          scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
          if len(scripts) != 1:
              raise SystemExit(f'Ожидался один встроенный script, найдено {len(scripts)}')
          Path('/tmp/site.js').write_text(scripts[0], encoding='utf-8')
          print('Сезонный дашборд настроен корректно')
          PY

      - name: Проверить JavaScript
        run: node --check /tmp/site.js

      - name: Сохранить проверенный index.html
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html не изменился"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Обновить сезонный дашборд"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
