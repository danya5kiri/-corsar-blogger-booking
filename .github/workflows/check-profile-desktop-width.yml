name: Проверить ширину мини-ЛК на десктопе

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/patch_profile_desktop_width.py
      - .github/workflows/check-profile-desktop-width.yml

permissions:
  contents: write

jobs:
  patch-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Получить ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Применить адаптивную корректировку
        run: python3 scripts/patch_profile_desktop_width.py

      - name: Проверить структуру и JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          assert 'grid-template-columns: minmax(160px, .85fr) minmax(0, 1.15fr);' in text
          assert text.count('id="cb-profile-entry-input"') == 1
          assert text.index('id="creator-profile"') > text.index('id="results"')
          assert text.index('id="creator-profile"') < text.index('id="creacloud"')
          assert 'creatorStoryItems = getPublishedContentItems().slice(0, 5);' in text
          assert 'findBookingUniqueAlternative' in text
          assert 'window.visualViewport' not in text
          assert 'document.body.style.position' not in text
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', text, flags=re.S | re.I)
          Path('/tmp/corsar-inline.js').write_text('\n'.join(s for s in scripts if s.strip()), encoding='utf-8')
          PY
          node --check /tmp/corsar-inline.js

      - name: Сохранить корректировку
        run: |
          if git diff --quiet -- index.html; then
            echo "Корректировка уже применена"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Уточнить ширину мини-ЛК на узком десктопе"
          git push origin HEAD:${{ github.head_ref }}
