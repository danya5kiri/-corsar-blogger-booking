name: Проверить CTA лидера, ники и погоду

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/patch_content_cta_leaders_weather.py
      - .github/workflows/check-content-cta-leaders-weather.yml

permissions:
  contents: write

jobs:
  patch-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Получить ветку PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Применить патч
        run: python3 scripts/patch_content_cta_leaders_weather.py

      - name: Проверить изменения
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path("index.html").read_text(encoding="utf-8")

          assert 'var WEATHER_REFRESH_INTERVAL = 3 * 60 * 60 * 1000;' in text
          assert 'var WEATHER_REFRESH_INTERVAL = 12 * 60 * 60 * 1000;' not in text
          assert '>Добавить контент <span aria-hidden="true">↓</span></span>' in text
          assert 'function focusContentSubmission()' in text

          content_fn = text.split('function renderContentLeader(){', 1)[1].split('function getContentPlatform', 1)[0]
          assert 'leaderCard.onclick = focusContentSubmission;' in content_fn
          assert 'focusCreatorResults(this.getAttribute("data-creator"))' not in content_fn

          name_css = text.split('.cb-leader-card .cb-leader-name {', 1)[1].split('}', 1)[0]
          assert 'line-height: 1.14;' in name_css
          assert 'padding-bottom: .14em;' in name_css
          assert 'min-height: 1.18em;' in name_css

          for selector in ('.cb-link-button-chat {', '.cb-link-button-booking {', '.cb-link-button-content {'):
              block = text.split(selector, 1)[1].split('}', 1)[0]
              assert 'color: var(--cb-ink);' in block
              assert 'linear-gradient(135deg' in block

          assert 'https://script.google.com/macros/s/AKfycbyRUzCwCTkj4TzURMsYfCZGVRrZnxoeoqTzz76w3n9qz-JlU4ji2i3e1xYQr4CymGsf8Q/exec' in text
          assert 'function submitBooking()' in text
          assert 'function submitReport()' in text
          assert 'function setupLeadersCarousel()' in text
          assert 'var LEADER_AUTO_INTERVAL = 5000;' in text

          scripts = re.findall(r'<script>(.*?)</script>', text, flags=re.S)
          assert scripts, 'Не найден встроенный JavaScript'
          Path('/tmp/corsar-inline.js').write_text('\n'.join(scripts), encoding='utf-8')
          print('Структура и ключевая логика сохранены')
          PY
          node --check /tmp/corsar-inline.js

      - name: Зафиксировать index.html в проверочной ветке
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html уже обновлён"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Обновить CTA контента, карточки и погоду"
          git push origin HEAD:${{ github.head_ref }}
