name: Apply CREACLOUD refinement package

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-test:
    if: github.head_ref == 'refine-creacloud-redesign-ui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply refinement patch when needed
        run: |
          if grep -q 'id="cb-call-submit"' index.html; then
            echo "Refinement markup is already present"
          else
            python tools/fix_refinement_patcher.py
            python tools/apply_redesign_refinements.py
          fi
      - name: Preserve booking function contract
        run: python tools/post_fix_refinement_output.py
      - name: Run product and design tests
        run: |
          node --check creacloud-design.js
          node tests/site_health_test.js
          node tests/design_modes_test.js
          python - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          css = Path('creacloud-redesign.css').read_text(encoding='utf-8')
          assert css.count('{') == css.count('}'), 'unbalanced CSS'
          assert 'id="cb-call-submit"' in html
          assert 'function setupRedesignNavigationBehavior()' in html
          assert 'function submitBooking()' in html
          assert 'function setBookingSubmitBusy(busy, busyText){\n  setSubmitBusy("cb-submit", busy, busyText);' in html
          assert 'CREACLOUD refinements v2' in css
          assert 'window.CREACLOUD_DESIGN_MODE = "redesign"' in Path('creacloud-design.js').read_text(encoding='utf-8')
          print('Refinement structure is valid')
          PY
      - name: Commit refined files
        run: |
          rm -f refinement-patch-error.txt refinement-test-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No refinement changes to commit"
            exit 0
          fi
          git commit -m "Исправить работу кнопок бронирования"
          git push origin HEAD:${{ github.head_ref }}
