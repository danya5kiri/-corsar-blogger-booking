name: Apply CREACLOUD refinement package

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-test:
    if: github.head_ref == 'refine-creacloud-redesign-ui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Fix refinement patcher
        run: python tools/fix_refinement_patcher.py
      - name: Apply refinement patch
        run: |
          set +e
          python tools/apply_redesign_refinements.py > /tmp/refinement-patch-output.txt 2>&1
          status=$?
          cat /tmp/refinement-patch-output.txt
          if [ $status -ne 0 ]; then
            cp /tmp/refinement-patch-output.txt refinement-patch-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add refinement-patch-error.txt
            git commit -m "Зафиксировать ошибку патча доработок" || true
            git push origin HEAD:${{ github.head_ref }} || true
            exit $status
          fi
      - name: Run product and design tests
        run: |
          set +e
          : > /tmp/refinement-test-output.txt
          node --check creacloud-design.js >> /tmp/refinement-test-output.txt 2>&1
          first=$?
          node tests/site_health_test.js >> /tmp/refinement-test-output.txt 2>&1
          second=$?
          node tests/design_modes_test.js >> /tmp/refinement-test-output.txt 2>&1
          third=$?
          python - <<'PY' >> /tmp/refinement-test-output.txt 2>&1
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          css = Path('creacloud-redesign.css').read_text(encoding='utf-8')
          assert css.count('{') == css.count('}'), 'unbalanced CSS'
          assert 'id="cb-call-submit"' in html
          assert 'function setupRedesignNavigationBehavior()' in html
          assert 'CREACLOUD refinements v2' in css
          assert 'window.CREACLOUD_DESIGN_MODE = "redesign"' in Path('creacloud-design.js').read_text(encoding='utf-8')
          print('Refinement structure is valid')
          PY
          fourth=$?
          status=0
          if [ $first -ne 0 ] || [ $second -ne 0 ] || [ $third -ne 0 ] || [ $fourth -ne 0 ]; then status=1; fi
          cat /tmp/refinement-test-output.txt
          if [ $status -ne 0 ]; then
            cp /tmp/refinement-test-output.txt refinement-test-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add refinement-test-error.txt
            git commit -m "Зафиксировать ошибку тестов доработок" || true
            git push origin HEAD:${{ github.head_ref }} || true
            exit $status
          fi
      - name: Commit refined files
        run: |
          rm -f refinement-patch-error.txt refinement-test-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html creacloud-redesign.css tests/design_modes_test.js tools/apply_redesign_refinements.py refinement-patch-error.txt refinement-test-error.txt
          if git diff --cached --quiet; then
            echo "No refinement changes to commit"
            exit 0
          fi
          git commit -m "Доработать интерфейс CREACLOUD по итогам просмотра"
          git push origin HEAD:${{ github.head_ref }}
