name: Проверить пять звёзд уникальных туров

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/update_ranking_unique_stars.py
      - .github/workflows/check-ranking-five-stars.yml

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Применить изменение
        run: python3 scripts/update_ranking_unique_stars.py

      - name: Проверить структуру и логику
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')

          required = [
              'var TOTAL_UNIQUE_TOURS = 5;',
              'function renderTourVarietyStars(uniqueTours)',
              'cb-rank-coverage-stars',
              'cb-rank-coverage-star',
              "' из ' + TOTAL_UNIQUE_TOURS",
              'Math.min(getCreatorTourVariety(tg), TOTAL_UNIQUE_TOURS)',
              '<span class="cb-rank-score">' + "' + item.visits + '",
          ]
          for marker in required:
              if marker not in text:
                  raise SystemExit(f'Не найден обязательный маркер: {marker}')

          forbidden = [
              'cb-rank-coverage-dot',
              'renderTourVarietyDots',
              'uniqueTours / visits',
              'window.visualViewport',
              'document.body.style.position = "fixed"',
          ]
          for marker in forbidden:
              if marker in text:
                  raise SystemExit(f'Найден запрещённый маркер: {marker}')

          if 'return b.visits - a.visits || a.name.localeCompare(b.name, "ru");' not in text:
              raise SystemExit('Изменена действующая сортировка рейтинга')

          if 'if(!users[tg]) users[tg] = 0;\n      users[tg] += 1;' not in text:
              raise SystemExit('Изменён текущий подсчёт общего количества поездок')

          if 'API_URL: "https://script.google.com/macros/s/' not in text:
              raise SystemExit('API_URL повреждён')

          scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
          if len(scripts) != 1:
              raise SystemExit(f'Ожидался один встроенный script, найдено {len(scripts)}')
          Path('/tmp/site.js').write_text(scripts[0], encoding='utf-8')
          print('Пять звёзд и знаменатель 5 настроены корректно')
          PY

      - name: Проверить JavaScript
        run: node --check /tmp/site.js

      - name: Сохранить проверенный index.html
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html не изменился"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Заменить шкалу уникальных туров на пять звёзд"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
