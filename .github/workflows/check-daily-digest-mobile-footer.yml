name: Проверить ежедневную сводку и мобильный календарь

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - scripts/patch_daily_digest_mobile_footer.py
      - .github/workflows/check-daily-digest-mobile-footer.yml

permissions:
  contents: write

jobs:
  patch-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Получить ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Применить патч
        run: |
          if grep -q 'corsar_daily_notice_seen_v1' index.html; then
            echo 'Патч уже применён'
          else
            python3 scripts/patch_daily_digest_mobile_footer.py
          fi

      - name: Проверить структуру и логику
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')

          checks = {
              'мобильный класс записей': 'cb-day-count cb-day-count-bookings' in text,
              'скрытие записей только на мобильном': '.cb-day-count-bookings {\n    display: none;' in text,
              'занятые даты сохраняют busy': 'if(count > 0) cell.className += " busy";' in text,
              'туры остаются в календаре': "туров: ' + toursCount" in text,
              'центрирование CREACLOUD': 'flex-direction: column;\n  justify-content: center;\n  gap: 14px;' in text and 'text-align: center;' in text,
              'ежедневный ключ': 'corsar_daily_notice_seen_v1' in text,
              'сводка сегодня и вчера': 'buildDailyPeriodNoticeItem("Сегодня"' in text and 'buildDailyPeriodNoticeItem("Вчера"' in text,
              'три лидерские номинации': 'buildCurrentLeadersNotice' in text and 'buildUniqueLeaderTransitionTimeline' in text,
              'обновления портала': 'PORTAL_UPDATES' in text and 'buildPortalUpdatesNotice' in text,
              'нет пятничного фильтра': 'if(getWeekdayFromDateKey(today) !== 5) return false;' not in text,
              'отдельное окно лидеров не запускается': '  setupLeaderChangeNotice();' not in text,
              'единое уведомление': 'scheduleCompactNotice(900);' in text,
              'API сохранён': 'AKfycbyRUzCwCTkj4TzURMsYfCZGVRrZnxoeoqTzz76w3n9qz-JlU4ji2i3e1xYQr4CymGsf8Q' in text,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit('Не пройдены проверки: ' + ', '.join(failed))
          print('Структурные проверки пройдены')
          PY

      - name: Проверить JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          start = text.rfind('<script>')
          end = text.rfind('</script>')
          if start < 0 or end <= start:
              raise SystemExit('Основной script не найден')
          Path('/tmp/corsar.js').write_text(text[start + len('<script>'):end], encoding='utf-8')
          PY
          node --check /tmp/corsar.js

      - name: Записать результат в ветку
        run: |
          if git diff --quiet -- index.html; then
            echo 'Изменений index.html нет'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Добавить ежедневную сводку и упростить мобильный календарь'
          git push origin HEAD:${{ github.head_ref }}
