<style>
#corsar-blogger-booking {
  font-family: Arial, sans-serif;
  max-width: 1180px;
  margin: 0 auto;
  padding: 24px 20px;
  color: #172033;
}

#corsar-blogger-booking * {
  box-sizing: border-box;
}

.cb-form-card,
.cb-calendar-card,
.cb-details-card,
.cb-analytics-card {
  border: 1px solid #e5e7eb;
  border-radius: 20px;
  background: #fff;
  padding: 18px;
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
}

.cb-form-card {
  margin-bottom: 18px;
}

.cb-form-card h2,
.cb-details-card h3,
.cb-analytics-card h3 {
  margin: 0 0 14px;
  font-size: 24px;
  font-weight: 800;
}

.cb-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.cb-field label {
  display: block;
  margin: 0 0 6px;
  font-size: 14px;
  color: #374151;
}

.cb-field input,
.cb-field select {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid #d8dee8;
  border-radius: 14px;
  font-size: 16px;
  background: #fff;
}

.cb-field select {
  min-height: 52px;
}

.cb-submit {
  grid-column: 1 / -1;
  width: 100%;
  padding: 15px 16px;
  background: #091225;
  color: #fff;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-weight: 700;
  font-size: 16px;
}

.cb-message {
  margin: 0 0 18px;
  padding: 14px 16px;
  border-radius: 14px;
  background: #eef6ff;
  color: #1f3a5f;
}

.cb-message.error {
  background: #fdecec;
  color: #8a1f1f;
}

.cb-calendar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(285px, 1fr));
  gap: 18px;
  margin-bottom: 18px;
}

.cb-calendar-card {
  padding: 16px;
}

.cb-month-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 14px;
}

.cb-weekdays,
.cb-days {
  display: grid !important;
  grid-template-columns: repeat(7, minmax(0, 1fr)) !important;
  gap: 6px;
}

.cb-weekday {
  text-align: center;
  font-size: 12px;
  color: #7b8494;
  padding-bottom: 6px;
  font-weight: 700;
}

.cb-empty {
  min-height: 50px;
}

.cb-day {
  width: 100%;
  min-height: 52px;
  border: 1px solid #d8dee8;
  border-radius: 10px;
  background: #f9fafb;
  cursor: pointer;
  font-size: 14px;
  padding: 5px 3px;
  color: #172033;
  text-align: center;
}

.cb-day:hover {
  background: #eef6ff;
}

.cb-day.has-tours {
  background: #eff6ff;
  border-color: #bfdbfe;
}

.cb-day.busy {
  background: #fff7ed;
  border-color: #fdba74;
}

.cb-day.full {
  background: #fee2e2;
  border-color: #fca5a5;
}

.cb-day.selected {
  outline: 3px solid #93c5fd;
}

.cb-day-num {
  display: block;
  font-weight: 800;
}

.cb-day-count {
  display: block;
  font-size: 11px;
  color: #6b7280;
  margin-top: 2px;
  line-height: 1.1;
}

.cb-details-card {
  margin-bottom: 18px;
}

.cb-date-list {
  display: grid;
  gap: 8px;
}

.cb-date-row {
  padding: 10px 12px;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  background: #f9fafb;
  font-size: 14px;
}

.cb-tour-name {
  display: block;
  margin-top: 4px;
  color: #374151;
  line-height: 1.35;
}

.cb-analytics-card {
  margin-top: 18px;
}

.cb-table-wrap {
  overflow-x: auto;
}

.cb-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  margin-top: 10px;
}

.cb-table th,
.cb-table td {
  border: 1px solid #e5e7eb;
  padding: 9px;
  text-align: left;
  vertical-align: top;
}

.cb-table th {
  background: #f3f4f6;
}

.cb-small {
  font-size: 13px;
  color: #6b7280;
}

@media (max-width: 900px) {
  #corsar-blogger-booking {
    padding: 20px 16px;
  }

  .cb-form-grid {
    grid-template-columns: 1fr;
  }

  .cb-calendar {
    grid-template-columns: 1fr;
  }
}
</style>

var bookings = [];
var selectedDate = "";

var months = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
var weekdays = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

function $(id){ return document.getElementById(id); }
function pad(n){ return String(n).padStart(2,"0"); }
function makeDate(y,m,d){ return y + "-" + pad(m+1) + "-" + pad(d); }

function escapeHtml(v){
  return String(v || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function normalizeDate(v){
  if(!v) return "";
  var s = String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  var d = new Date(s);
  if(!isNaN(d.getTime())) {
    return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
  }

  return s;
}

function normalizeTelegram(v){
  var tg = String(v || "").trim().toLowerCase().replace(/\s+/g,"");
  if(tg && tg.charAt(0) !== "@") tg = "@" + tg;
  return tg;
}

function setMessage(text, isError){
  var el = $("cb-message");
  if(!el) return;
  el.className = isError ? "cb-message error" : "cb-message";
  el.innerHTML = text;
}

function getFormDate(){
  var el = $("cb-date");
  return el ? String(el.value || "").trim() : "";
}

function setFormDate(date){
  selectedDate = date;
  var el = $("cb-date");
  if(el) el.value = date;
}

function isDateInSeason(date){
  return /^\d{4}-\d{2}-\d{2}$/.test(date) && date >= "2026-04-01" && date <= "2026-10-31";
}

function getToursByDate(date){
  return TOURS_BY_DATE[date] || [];
}

function renderTours(date){
  var select = $("cb-tour");
  if(!select) return;

  select.innerHTML = "";

  if(!date){
    select.innerHTML = '<option value="">Сначала выберите дату</option>';
    return;
  }

  var tours = getToursByDate(date);

  if(!tours.length){
    select.innerHTML = '<option value="">На эту дату туров нет</option>';
    return;
  }

  select.innerHTML = '<option value="">Выберите тур</option>';

  tours.forEach(function(t){
    var opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    select.appendChild(opt);
  });
}

function getBookingsByDate(date){
  return bookings.filter(function(b){
    return normalizeDate(b.date) === date;
  });
}

function countByDate(date){
  return getBookingsByDate(date).length;
}

function renderCalendar(){
  var root = $("cb-calendar");
  if(!root) return;

  root.innerHTML = "";
  var formDate = getFormDate();

  for(var m = CONFIG.START_MONTH; m <= CONFIG.END_MONTH; m++){
    var daysInMonth = new Date(CONFIG.YEAR, m+1, 0).getDate();
    var firstDay = new Date(CONFIG.YEAR, m, 1).getDay();
    var offset = firstDay === 0 ? 6 : firstDay - 1;

    var monthBlock = document.createElement("div");
    monthBlock.className = "cb-calendar-card";

    var title = document.createElement("div");
    title.className = "cb-month-title";
    title.textContent = months[m] + " " + CONFIG.YEAR;
    monthBlock.appendChild(title);

    var weekdayGrid = document.createElement("div");
    weekdayGrid.className = "cb-weekdays";

    weekdays.forEach(function(w){
      var wd = document.createElement("div");
      wd.className = "cb-weekday";
      wd.textContent = w;
      weekdayGrid.appendChild(wd);
    });

    monthBlock.appendChild(weekdayGrid);

    var daysGrid = document.createElement("div");
    daysGrid.className = "cb-days";

    for(var i=0; i<offset; i++){
      var empty = document.createElement("div");
      empty.className = "cb-empty";
      daysGrid.appendChild(empty);
    }

    for(var d=1; d<=daysInMonth; d++){
      (function(day, monthIndex){
        var date = makeDate(CONFIG.YEAR, monthIndex, day);
        var count = countByDate(date);
        var toursCount = getToursByDate(date).length;

        var cell = document.createElement("button");
        cell.type = "button";
        cell.className = "cb-day";

        if(toursCount > 0) cell.className += " has-tours";
        if(count > 0) cell.className += " busy";
        if(count >= CONFIG.MAX_PER_DAY) cell.className += " full";
        if(date === formDate) cell.className += " selected";

        cell.innerHTML =
          '<span class="cb-day-num">' + day + '</span>' +
          (toursCount > 0 ? '<span class="cb-day-count">туров: ' + toursCount + '</span>' : '') +
          (count > 0 ? '<span class="cb-day-count">занято: ' + count + '</span>' : '');

        cell.onclick = function(){
          setFormDate(date);
          renderTours(date);
          renderCalendar();
          renderDetails(date);
          setMessage("Дата выбрана: <b>" + date + "</b>. Теперь выберите тур.", false);
        };

        daysGrid.appendChild(cell);
      })(d, m);
    }

    monthBlock.appendChild(daysGrid);
    root.appendChild(monthBlock);
  }
}

function renderDetails(date){
  var el = $("cb-details");
  if(!el) return;

  if(!date){
    el.innerHTML = '<h3>Записи по выбранной дате</h3><div class="cb-small">Нажмите на дату в календаре.</div>';
    return;
  }

  var rows = getBookingsByDate(date);
  var tours = getToursByDate(date);

  var html = '<h3>Записи на ' + escapeHtml(date) + '</h3>';

  if(tours.length){
    html += '<div class="cb-small" style="margin-bottom:10px">Туры в эту дату: ' + tours.length + '</div>';
  } else {
    html += '<div class="cb-small" style="margin-bottom:10px">По расписанию на эту дату туров нет.</div>';
  }

  if(!rows.length){
    html += '<div class="cb-small">На эту дату записей пока нет.</div>';
  } else {
    html += '<div class="cb-date-list">';
    rows.forEach(function(b){
      var tg = normalizeTelegram(b.telegram) || "без Telegram";
      var tour = b.tour || "тур не указан";
      html += '<div class="cb-date-row"><b>' + escapeHtml(tg) + '</b><span class="cb-tour-name">' + escapeHtml(tour) + '</span></div>';
    });
    html += '</div>';
  }

  el.innerHTML = html;
}

function renderAnalytics(){
  var el = $("cb-analytics");
  if(!el) return;

  var users = {};
  var dates = {};
  var tours = {};
  var dateTours = {};

  bookings.forEach(function(b){
    var tg = normalizeTelegram(b.telegram);
    var date = normalizeDate(b.date);
    var tour = b.tour || "без тура";

    if(tg){
      if(!users[tg]) users[tg] = 0;
      users[tg] += 1;
    }

    if(date){
      if(!dates[date]) dates[date] = 0;
      dates[date] += 1;
    }

    if(!tours[tour]) tours[tour] = 0;
    tours[tour] += 1;

    if(date){
      var key = date + "||" + tour;
      if(!dateTours[key]) dateTours[key] = 0;
      dateTours[key] += 1;
    }
  });

  var userRows = Object.keys(users).sort().map(function(tg){
    return '<tr><td>' + escapeHtml(tg) + '</td><td>' + users[tg] + '</td></tr>';
  }).join("");

  var dateRows = Object.keys(dates).sort().map(function(date){
    return '<tr><td>' + escapeHtml(date) + '</td><td>' + dates[date] + '</td></tr>';
  }).join("");

  var tourRows = Object.keys(tours).sort().map(function(t){
    return '<tr><td>' + escapeHtml(t) + '</td><td>' + tours[t] + '</td></tr>';
  }).join("");

  var dateTourRows = Object.keys(dateTours).sort().map(function(key){
    var parts = key.split("||");
    return '<tr><td>' + escapeHtml(parts[0]) + '</td><td>' + escapeHtml(parts[1]) + '</td><td>' + dateTours[key] + '</td></tr>';
  }).join("");

  el.innerHTML =
    '<h3>Аналитика</h3>' +
    '<div class="cb-table-wrap">' +
    '<table class="cb-table">' +
    '<tr><th>Telegram</th><th>Сколько раз записан</th></tr>' +
    (userRows || '<tr><td colspan="2">Пока нет данных</td></tr>') +
    '</table></div>' +

    '<h3 style="margin-top:18px">Занятость по датам</h3>' +
    '<div class="cb-table-wrap">' +
    '<table class="cb-table">' +
    '<tr><th>Дата</th><th>Записей</th></tr>' +
    (dateRows || '<tr><td colspan="2">Пока нет данных</td></tr>') +
    '</table></div>' +

    '<h3 style="margin-top:18px">Популярность туров</h3>' +
    '<div class="cb-table-wrap">' +
    '<table class="cb-table">' +
    '<tr><th>Тур</th><th>Записей</th></tr>' +
    (tourRows || '<tr><td colspan="2">Пока нет данных</td></tr>') +
    '</table></div>' +

    '<h3 style="margin-top:18px">Занятость по дате и туру</h3>' +
    '<div class="cb-table-wrap">' +
    '<table class="cb-table">' +
    '<tr><th>Дата</th><th>Тур</th><th>Записей</th></tr>' +
    (dateTourRows || '<tr><td colspan="3">Пока нет данных</td></tr>') +
    '</table></div>';
}

function loadData(){
  setMessage("Загружаем данные...", false);

  var callbackName = "corsarBookingsCallback_" + Date.now();

  window[callbackName] = function(data){
    try {
      bookings = Array.isArray(data) ? data : [];
      renderTours(getFormDate());
      renderCalendar();
      renderDetails(getFormDate());
      renderAnalytics();
      setMessage("Данные загружены. Всего записей: <b>" + bookings.length + "</b>.", false);
    } catch(e) {
      setMessage("Ошибка обработки данных.", true);
    } finally {
      var oldScript = document.getElementById(callbackName);
      if(oldScript) oldScript.remove();
      try { delete window[callbackName]; } catch(e) {}
    }
  };

  var script = document.createElement("script");
  script.id = callbackName;
  script.src = CONFIG.API_URL + "?callback=" + callbackName + "&t=" + Date.now();
  script.onerror = function(){
    setMessage("Ошибка загрузки Google API.", true);
  };

  document.body.appendChild(script);
}

function submitBooking(){
  var date = getFormDate();
  var tg = normalizeTelegram($("cb-telegram").value);
  var tour = $("cb-tour") ? String($("cb-tour").value || "").trim() : "";

  if(!date){
    setMessage("Укажите дату.", true);
    return;
  }

  if(!isDateInSeason(date)){
    setMessage("Дата должна быть в период с 1 апреля по 31 октября 2026.", true);
    return;
  }

  if(!getToursByDate(date).length){
    setMessage("На выбранную дату нет туров в расписании.", true);
    return;
  }

  if(!tour){
    setMessage("Выберите тур.", true);
    return;
  }

  if(!tg){
    setMessage("Введите Telegram.", true);
    return;
  }

  var duplicate = bookings.some(function(b){
    return normalizeDate(b.date) === date && normalizeTelegram(b.telegram) === tg && String(b.tour || "").trim() === tour;
  });

  if(duplicate){
    setMessage("Этот Telegram уже записан на выбранный тур в эту дату.", true);
    return;
  }

  var payload = {
    date: date,
    telegram: tg,
    tour: tour,
    name: "",
    phone: "",
    count: 1,
    participants: 1,
    status: "Новая заявка",
    comment: ""
  };

  setMessage("Отправляем заявку...", false);

  fetch(CONFIG.API_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(payload)
  })
  .then(function(){
    bookings.push(payload);
    $("cb-telegram").value = "";
    renderCalendar();
    renderDetails(date);
    renderAnalytics();
    setMessage("Заявка отправлена. Дата и тур отмечены в записи.", false);
  })
  .catch(function(){
    setMessage("Не удалось отправить заявку.", true);
  });
}

function init(){
  if(!$("corsar-blogger-booking")) return;

  var submit = $("cb-submit");
  var dateInput = $("cb-date");

  if(submit) submit.onclick = submitBooking;

  if(dateInput){
    dateInput.onchange = function(){
      setFormDate(this.value);
      renderTours(this.value);
      renderCalendar();
      renderDetails(this.value);
      if(this.value) setMessage("Дата выбрана: <b>" + this.value + "</b>. Теперь выберите тур.", false);
    };
  }

  loadData();
}

if(document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}

})();
</script>
